name: Validate Delivery

on:
  pull_request:
    types: [opened, edited, synchronize]
  pull_request_target:
    types: [opened, edited, synchronize]

jobs:
  validate:
    name: Validate Delivery PR
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout do código do PR (ESSENCIAL)
      # ----------------------------
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # ----------------------------
      # Get changed files (API GitHub - funciona com fork)
      # ----------------------------
      - name: Get changed files
        id: files
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr
              }
            );

            const filenames = files.map(f => f.filename);

            console.log("Files:", filenames);

            core.setOutput("files", filenames.join("\n"));

      # ----------------------------
      # Validate branch name
      # ----------------------------
      - name: Validate branch name
        run: |
          branch="${{ github.head_ref }}"
          echo "Branch: $branch"

          if [[ ! "$branch" =~ ^student-[0-9]+-delivery[1-5]$ ]]; then
            echo "Branch must follow: student-XX-deliveryX"
            exit 1
          fi

      # ----------------------------
      # Validate changed files
      # ----------------------------
      - name: Validate changed files
        run: |
          files="${{ steps.files.outputs.files }}"

          echo "Changed files:"
          echo "$files"

          count=$(echo "$files" | wc -l)

          if [ "$count" -ne 1 ]; then
            echo "Only ONE file per delivery is allowed"
            exit 1
          fi

          file=$(echo "$files")

          if [[ "$file" != students/* ]]; then
            echo "File must be inside students/"
            exit 1
          fi

          if [[ "$file" != *delivery1.md && "$file" != *delivery2.md && "$file" != *delivery3.md && "$file" != *delivery4.md && "$file" != *delivery5.md ]]; then
            echo "Invalid file name. Must be deliveryX.md"
            exit 1
          fi

      # ----------------------------
      # Validate delivery matches branch
      # ----------------------------
      - name: Validate delivery vs branch
        run: |
          branch="${{ github.head_ref }}"
          file="${{ steps.files.outputs.files }}"

          if [[ "$branch" == *delivery1* && "$file" != *delivery1.md ]]; then
            echo "Branch delivery1 must submit delivery1.md"
            exit 1
          fi

          if [[ "$branch" == *delivery2* && "$file" != *delivery2.md ]]; then
            echo "Branch delivery2 must submit delivery2.md"
            exit 1
          fi

          if [[ "$branch" == *delivery3* && "$file" != *delivery3.md ]]; then
            echo "Branch delivery3 must submit delivery3.md"
            exit 1
          fi

          if [[ "$branch" == *delivery4* && "$file" != *delivery4.md ]]; then
            echo "Branch delivery4 must submit delivery4.md"
            exit 1
          fi

          if [[ "$branch" == *delivery5* && "$file" != *delivery5.md ]]; then
            echo "Branch delivery5 must submit delivery5.md"
            exit 1
          fi

      # ----------------------------
      # Validate file content (agora FUNCIONA)
      # ----------------------------
      - name: Validate content
        run: |
          file="${{ steps.files.outputs.files }}"

          echo "Checking file content: $file"

          if [ ! -f "$file" ]; then
            echo "File not found"
            exit 1
          fi

          if [ ! -s "$file" ]; then
            echo "File is empty"
            exit 1
          fi

          echo "✅ Validation passed"
